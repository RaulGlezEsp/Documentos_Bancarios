<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Documentos bancarios</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 20px auto; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, textarea, select {
            width: 100%; padding: 8px; margin-top: 5px;
            border: 1px solid #ccc; border-radius: 4px;
        }
        button {
            margin-top: 20px; padding: 10px 20px;
            background: #4CAF50; color: white;
            border: none; border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
        form {
            max-width: 600px;
            margin: auto;
            padding: 15px;
        }

        form label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        form input,
        form select,
        form textarea {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            box-sizing: border-box;
            margin-top: 4px;
        }

        form button {
            margin-top: 20px;
            padding: 12px;
            font-size: 16px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        form button:hover {
            background-color: #45a049;
        }

        /* Responsive ajustes si hicieras columnas en el futuro */
        @media (max-width: 600px) {
            form {
                padding: 10px;
            }
        }

    </style>
</head>
<body>

<h2>Registrar nuevo documento</h2>
<!--

-->
<form id="formBank">  
    Operario: <strong id="operarioLabel"></strong>
    <br>

    <label>Numero factura *</label>
    <input type="text" name="num_factura" required></select>

    <label>Cliente *</label>
    <input type="text" name="cliente" required>

    <label>Importe *</label>
    <input type="number" step="0.01" name="importe">


    <label>Cuenta bancaria *</label>
    <input type="text" name="cuenta_bancaria" required>

    <label>Fecha Libramiento *</label>
    <input type="date" name="Fecha_libramiento" required>

    <label>Fecha Vencimiento *</label>
    <input type="date" name="Fecha_vencimiento" required>

    


    <button type="submit">Registrar xml</button>
    <button type="button" onclick="location.href='/descargarinformes.html'">Comprobar informes antiguos</button>
    <button onclick="location.href='/historial.html'">Comprobar historial registros</button>
</form>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        
    });
 
    function sanitizeFilename(name) {
        return name.replace(/[^a-zA-Z0-9_\-]/g, "_"); // sustituye caracteres no válidos por "_"
    }


fetch("/api/me")
  .then(r => r.json())
  

document.getElementById("formBank").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);

    // 1. Insertar factura
    const res = await fetch("/api/insert", {
        method: "POST",
        body: formData
    });

    if (!res.ok) {
        alert("Error insertando");
        return;
    }

    const insertData = await res.json();
    alert("Registro insertado correctamente");

    // 2. Generar XML
    const xmlRes = await fetch(`/api/generarXML/${insertData.id}`);

    if (!xmlRes.ok) {
        alert("Error generando XML");
        return;
    }

    // 3. Descargar XML
    const blob = await xmlRes.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    const year = new Date().getFullYear();

    a.href = url;
    a.download = `Factura_${insertData.id}_${year}.xml`;
    a.click();

    document.getElementById("formBank").reset();
});

</script>

</body>
</html>
